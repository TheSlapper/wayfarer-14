- type: entity # deployed turret
  id: WeaponTurretAsmgtPOIRogueSilicon
  name: ASMGT
  description: |-
    An Autonomous Sentry Machine Gun Turret (ASMGT) is a magazine-fed turret with barrels compatible with .20, .25, .30 and .35 cartridges.
  suffix: RogueSilicon
  parent:
  - BaseWeaponTurretMagazineFed
  components:
  - type: PointLight
    enabled: true
    autoRot: true
    netsync: false
    radius: 16
    energy: 8
    mask: /Textures/_NF/Effects/LightMasks/beam.png
    color: "#990000"
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 600
      # TODO: Construction graph
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 3
            max: 5
  - type: Gun
    examineCaliber: gun-examine-caliber-asmgt
    burstFireRate: 8
    shotsPerBurst: 2
    burstCooldown: 0.25
    selectedMode: Burst
    availableModes:
    - Burst
  - type: MobThresholds
    thresholds:
      0: Alive
      2000: Dead # bandaid fix, value here should be high enough to prevent situations when mob(turret) changes it's state before being destoyed
  - type: NPCImprintingOnSpawnBehaviour
    whitelist:
      components:
      - HumanoidAppearance
  - type: NpcFactionMember
    factions:
    - SiliconsExpeditionNF
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Turrets/magazinefed.rsi
    drawdepth: Mobs
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Appearance
  - type: MagazineVisuals
    magState: mag
    steps: 11
    zeroVisible: true
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineAsmgtUniversal30UraniumHighCapacity
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineAsmgt
